<!DOCTYPE html>
<html>

<head>

  <title>Werewolf Game</title>

  <link rel="stylesheet" href="style.css">

  <style>

    body{

      background:#111;
      color:white;

      font-family:Arial;

      padding:30px;
      text-align:center;
    }

    h1{

      margin-bottom:40px;
    }

    button{

      width:100%;

      max-width:300px;

      padding:16px;

      margin-bottom:15px;

      border:none;

      border-radius:14px;

      background:#5865f2;

      color:white;

      font-size:18px;

      font-weight:bold;

      cursor:pointer;
    }

    .hidden{
      display:none;
    }

    .room-card{

      background:#1e1e1e;

      padding:15px;

      border-radius:14px;

      margin-bottom:12px;
    }

    .delete-btn{

      background:#ed4245;

      margin-top:10px;
    }

  </style>

</head>

<body>

<h1 id="secretTrigger">
  Werewolf Online
</h1>

<a href="player.html">
  <button>
    เข้าเป็นผู้เล่น
  </button>
</a>

<a href="host-create.html">
  <button>
    เข้าเป็น GM
  </button>
</a>

<div
  id="secretPanel"
  class="hidden"
>

  <h2>
    🔒 SECRET ADMIN
  </h2>

  <div id="roomList"></div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

let tapCount = 0;

let tapTimer = null;

const trigger =
document.getElementById(
  "secretTrigger"
);

trigger.addEventListener(
  "click",
  ()=>{

    tapCount++;

    clearTimeout(
      tapTimer
    );

    tapTimer =
    setTimeout(()=>{

      tapCount = 0;

    },1500);

    if(tapCount >= 5){

      openSecretPanel();

      tapCount = 0;

    }

  }
);

function openSecretPanel(){

  document.getElementById(
    "secretPanel"
  ).classList.remove(
    "hidden"
  );

  socket.emit(
    "getAllRooms"
  );

}

socket.on(
  "allRooms",
  (rooms)=>{

    const roomList =
    document.getElementById(
      "roomList"
    );

    roomList.innerHTML = "";

    if(rooms.length <= 0){

      roomList.innerHTML =
      "ไม่มีห้อง";

      return;

    }

    rooms.forEach(room=>{

      roomList.innerHTML += `

        <div class="room-card">

          <div>
            ห้อง:
            <b>${room.roomCode}</b>
          </div>

          <div>
            ผู้เล่น:
            ${room.players.length}
          </div>

          <button
            class="delete-btn"
            onclick="
              deleteRoom(
                '${room.roomCode}'
              )
            "
          >
            ยุบห้อง
          </button>

        </div>

      `;

    });

  }
);

function deleteRoom(roomCode){

  const confirmDelete =
  confirm(
    "ยุบห้อง " + roomCode + " ?"
  );

  if(!confirmDelete) return;

  socket.emit(
    "closeRoom",
    roomCode
  );

  socket.emit(
    "getAllRooms"
  );

}

</script>

</body>

</html>
